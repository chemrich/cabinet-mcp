name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref (e.g. rapid force-pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pure-Python paths — what the tests and evals are written against.
  # No CadQuery/opcut/rectpack, so this stays fast.
  lite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install (lite)
        run: uv sync --no-group full
      - name: Assert lite is lite
        # If a dep change ever pulls CadQuery into the lite env, this job
        # would silently test the full paths — fail loudly instead.
        run: uv run --no-group full python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('cadquery') is None else 1)"
      - name: Tests
        run: uv run --no-group full pytest tests/ -q
      - name: Evals
        run: uv run --no-group full python -m evals

  # Full install — exercises the CadQuery-backed geometry tests and the
  # opcut/rectpack/reportlab cutlist paths.
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: System deps (cairo headers — opcut pulls pycairo, which builds from sdist)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install (full)
        run: uv sync
      - name: Tests
        run: uv run pytest tests/ -q
      - name: Evals
        run: uv run python -m evals
